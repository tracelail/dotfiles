conky.config = {
--==============================================================================

--  Created : 2022/Jul/30
--  This theme is for conky version 1.10.8 or newer
-- 
--  MIMOSA DARK
--  ( A part of Leonis Conky themes pack )
--
--  author  : Closebox73
--  version : 4.0
--  variant : Verdant Fahrenheit
--  license : Distributed under the terms of GPLv3

--==============================================================================

-- Size and Position settings --
  alignment = 'bottom_left',
  gap_x = 30,
  gap_y = -50,
  maximum_width = 330,
  minimum_height = 700,
  minimum_width = 300,
  
-- Text settings --
  use_xft = true,
  override_utf8_locale = true,
  font = 'Roboto:light:size=9',
  
-- Color Settings --
  default_color = 'ffffff',
  default_outline_color = 'white',
  default_shade_color = 'white',
  color1 = '#FF4539',
  color2 = '#32d74c',
  
-- Window Settings --
  background = false,
  border_width = 1,
  draw_borders = false,
  draw_graph_borders = false,
  draw_outline = false,
  draw_shades = false,
  own_window = true,
  own_window_colour = '000000',
  own_window_class = 'Conky',
  draw_blended = false,
  own_window_argb_visual = false,
  own_window_type = 'desktop',
  own_window_transparent = true,
  own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
  stippled_borders = 0,
  
-- Others --
  cpu_avg_samples = 2,
  net_avg_samples = 2,
  double_buffer = true,
  out_to_console = false,
  out_to_stderr = false,
  extra_newline = false,
  update_interval = 1,
  uppercase = false,
  use_spacer = 'none',
  show_graph_scale = false,
  show_graph_range = false,
  lua_load = '~/.config/conky/Mimosa/lib/disk_bar.lua ~/.config/conky/Mimosa/lib/rings_rounded.lua',
  lua_draw_hook_pre = 'system_rings',
  lua_draw_hook_post = 'draw_disk_bars',
}

conky.text = [[
${execi 600 ~/.config/conky/Mimosa/scripts/weather-v4.0.sh -g}\
${image ~/.config/conky/Mimosa/assets/bg.png -s 300x461 -p 0,135}
${offset 0}${voffset 0}${font Inter:size=45}${time %H:%M}${font}
${offset 0}${voffset 3}${font Abel:size=14}${time %A %d %B}
${offset 14}${voffset 40}${font feather:size=25}${execi 15 ~/.config/conky/Mimosa/scripts/weather-v4.0.sh -i}${goto 73}${font Bebas Neue:size=22}${execi 100 ~/.config/conky/Mimosa/scripts/weather-v4.0.sh -t}°F${font}
${offset 14}${voffset 4}${color1}${font Abel:bold:size=14}${execi 100 ~/.config/conky/Mimosa/scripts/weather-v4.0.sh -n}${font}
${offset 14}${voffset 0}${color}${font Abel:size=12}${execi 100 ~/.config/conky/Mimosa/scripts/weather-v4.0.sh -d}${font}
${offset 14}${voffset 0}${color}${font Abel:size=8}Wind speed : ${execi 100 ~/.config/conky/Mimosa/scripts/weather-v4.0.sh -ws}mph
${offset 14}${voffset 0}${color}${font Abel:size=8}Humidity : ${execi 100 ~/.config/conky/Mimosa/scripts/weather-v4.0.sh -h}%
${offset 172}${voffset -115}${font Material:size=9}${font Abel:bold:size=8}: ${execi 5 ~/.config/conky/Mimosa/scripts/ssid}
${offset 172}${voffset 2}${font Abel:size=8}Dn : ${downspeed wlp2s0}${alignr 16}>>   ${totaldown wlp2s0}
${offset 172}${voffset 0}${color}${downspeedgraph wlp2s0 24,110 FF4539 FF4539}
${offset 172}${voffset -3}${color}${font Abel:size=8}Up : ${upspeed wlp2s0}${alignr 16}>>   ${totalup wlp2s0}
${offset 172}${voffset 0}${color B54036}${upspeedgraph wlp2s0 24,110 32d74c 32d74c}
${offset 27}${voffset 106}${color}${font Bebas Neue:size=18}${cpu cpu0}%${goto 104}${memperc}%${goto 170}${battery_percent BAT1}%${goto 240}${execi 2 ~/.config/conky/Mimosa/scripts/cputempf.sh}°F
${offset 14}${voffset 32}${color}${font Abel:bold:size=14}Storage${font}
${color}${offset 172}${voffset -20}${font Feather:size=22}
${color}${offset 172}${voffset 0}${font Abel:size=9}${execi 1 playerctl status} 
${color2}${offset 172}${voffset 0}${font Abel:bold:size=10}${execi 1 ~/.config/conky/Mimosa/scripts/playerctl-info.sh -a}${font}
${color}${offset 172}${voffset 0}${font Abel:italic:size=9}${execi 1 playerctl metadata xesam:title | cut -c 1-25}${font}
${color}${offset 172}${voffset 0}${font Abel:size=8}${execi 1 playerctl position --format "{{ duration(position) }}"}${font}
]]
